<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">Claude Manager Infographic</title>
  <desc id="desc">A poster explaining how Claude Manager scans, classifies, and helps manage the Claude Code data folder.</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#e7ece8" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#18202f" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #fbfcf8; }
      .ink { fill: #18202f; }
      .muted { fill: #5c677a; }
      .line { stroke: #d9e0ea; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #d9e0ea; stroke-width: 2; rx: 14; }
      .h1 { font: 900 80px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .h2 { font: 850 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .h3 { font: 800 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .body { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .small { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .mono { font: 700 24px "SF Mono", "Fira Code", Consolas, monospace; letter-spacing: 0; }
      .monoSmall { font: 800 17px "SF Mono", "Fira Code", Consolas, monospace; letter-spacing: 0; }
      .badge { font: 900 19px "SF Mono", "Fira Code", Consolas, monospace; fill: #ffffff; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="2200"/>
  <rect width="1600" height="2200" fill="url(#grid)" opacity="0.85"/>

  <g transform="translate(92 92)">
    <line x1="0" y1="18" x2="52" y2="18" stroke="#27795d" stroke-width="6" stroke-linecap="round"/>
    <text x="72" y="27" class="small" fill="#27795d">CLAUDE MANAGER</text>
    <text x="0" y="142" class="h1 ink">Make ~/.claude</text>
    <text x="0" y="236" class="h1 ink">readable and safe.</text>
    <text x="0" y="318" class="body muted">A zero-dependency workspace that maps Claude Code's local data,</text>
    <text x="0" y="354" class="body muted">classifies deletion risk, and turns cleanup into an informed choice.</text>
  </g>

  <g transform="translate(840 116)" filter="url(#shadow)">
    <rect width="650" height="420" rx="16" fill="#17202c"/>
    <rect width="650" height="60" rx="16" fill="#101721"/>
    <rect x="26" y="24" width="15" height="15" rx="8" fill="#d9473f"/>
    <rect x="56" y="24" width="15" height="15" rx="8" fill="#d38321"/>
    <rect x="86" y="24" width="15" height="15" rx="8" fill="#27795d"/>
    <text x="36" y="112" class="mono" fill="#91c8ff">$ node scripts/scan.js --html</text>

    <g transform="translate(36 164)">
      <rect width="150" height="42" rx="7" fill="#d9473f"/>
      <text x="75" y="28" class="badge" text-anchor="middle">CRITICAL</text>
      <text x="210" y="29" class="mono" fill="#e9eef5">projects/</text>
      <text x="560" y="29" class="mono" fill="#e9eef5" text-anchor="end">28.5 MB</text>
      <rect x="210" y="62" width="360" height="13" rx="3" fill="#344155"/>
      <rect x="210" y="62" width="360" height="13" rx="3" fill="#d9473f"/>
    </g>

    <g transform="translate(36 258)">
      <rect width="110" height="42" rx="7" fill="#d38321"/>
      <text x="55" y="28" class="badge" text-anchor="middle">HIGH</text>
      <text x="210" y="29" class="mono" fill="#e9eef5">plugins/</text>
      <text x="560" y="29" class="mono" fill="#e9eef5" text-anchor="end">5.5 MB</text>
      <rect x="210" y="62" width="360" height="13" rx="3" fill="#344155"/>
      <rect x="210" y="62" width="158" height="13" rx="3" fill="#d38321"/>
    </g>

    <g transform="translate(36 352)">
      <rect width="150" height="42" rx="7" fill="#168ca0"/>
      <text x="75" y="28" class="badge" text-anchor="middle">MEDIUM</text>
      <text x="210" y="29" class="mono" fill="#e9eef5">file-history/</text>
      <text x="560" y="29" class="mono" fill="#e9eef5" text-anchor="end">2.4 MB</text>
    </g>
  </g>

  <g transform="translate(92 640)">
    <rect class="card" width="320" height="180"/>
    <rect x="0" width="320" height="8" fill="#326eb7" rx="4"/>
    <text x="30" y="78" class="h2 ink">15+</text>
    <text x="30" y="118" class="body muted">known folders and files</text>
    <text x="30" y="152" class="body muted">documented in detail</text>

    <rect class="card" x="360" width="320" height="180"/>
    <rect x="360" width="320" height="8" fill="#27795d" rx="4"/>
    <text x="390" y="78" class="h2 ink">0</text>
    <text x="390" y="118" class="body muted">npm dependencies</text>
    <text x="390" y="152" class="body muted">needed to scan</text>

    <rect class="card" x="720" width="320" height="180"/>
    <rect x="720" width="320" height="8" fill="#d38321" rx="4"/>
    <text x="750" y="78" class="h2 ink">10-60 MB</text>
    <text x="750" y="118" class="body muted">typical local footprint</text>
    <text x="750" y="152" class="body muted">depending on usage</text>

    <rect class="card" x="1080" width="320" height="180"/>
    <rect x="1080" width="320" height="8" fill="#7052a0" rx="4"/>
    <text x="1110" y="78" class="h2 ink">4</text>
    <text x="1110" y="118" class="body muted">safety levels guide</text>
    <text x="1110" y="152" class="body muted">cleanup decisions</text>
  </g>

  <g transform="translate(92 910)">
    <text x="0" y="0" class="h2 ink">What it makes visible</text>
    <text x="0" y="48" class="body muted">Claude Manager separates working memory, config, stale data, and privacy-sensitive traces.</text>

    <g transform="translate(0 92)">
      <rect class="card" width="455" height="250"/>
      <rect x="28" y="28" width="126" height="38" rx="7" fill="#d9473f"/>
      <text x="91" y="53" class="badge" text-anchor="middle">CRITICAL</text>
      <text x="28" y="112" class="mono ink">projects/</text>
      <text x="28" y="158" class="body muted">Conversation transcripts,</text>
      <text x="28" y="192" class="body muted">project context, and the</text>
      <text x="28" y="226" class="body muted">largest privacy surface.</text>
    </g>

    <g transform="translate(485 92)">
      <rect class="card" width="455" height="250"/>
      <rect x="28" y="28" width="88" height="38" rx="7" fill="#d38321"/>
      <text x="72" y="53" class="badge" text-anchor="middle">HIGH</text>
      <text x="28" y="112" class="mono ink">plugins/ skills/ todos/</text>
      <text x="28" y="158" class="body muted">Installed capabilities and</text>
      <text x="28" y="192" class="body muted">active working state that</text>
      <text x="28" y="226" class="body muted">users will notice losing.</text>
    </g>

    <g transform="translate(970 92)">
      <rect class="card" width="455" height="250"/>
      <rect x="28" y="28" width="122" height="38" rx="7" fill="#168ca0"/>
      <text x="89" y="53" class="badge" text-anchor="middle">MEDIUM</text>
      <text x="28" y="112" class="mono ink">plans/ file-history/</text>
      <text x="28" y="158" class="body muted">Useful session memory that</text>
      <text x="28" y="192" class="body muted">can be pruned after it is</text>
      <text x="28" y="226" class="body muted">old, completed, or stale.</text>
    </g>

    <g transform="translate(0 372)">
      <rect class="card" width="455" height="250"/>
      <rect x="28" y="28" width="78" height="38" rx="7" fill="#747b86"/>
      <text x="67" y="53" class="badge" text-anchor="middle">LOW</text>
      <text x="28" y="112" class="mono ink">cache/ debug/ telemetry/</text>
      <text x="28" y="158" class="body muted">Temporary files usually</text>
      <text x="28" y="192" class="body muted">safe to clear after active</text>
      <text x="28" y="226" class="body muted">sessions are finished.</text>
    </g>

    <g transform="translate(485 372)">
      <rect class="card" width="455" height="250"/>
      <rect x="28" y="28" width="78" height="38" rx="7" fill="#747b86"/>
      <text x="67" y="53" class="badge" text-anchor="middle">LOW</text>
      <text x="28" y="112" class="mono ink">shell-snapshots/</text>
      <text x="28" y="158" class="body muted">Safe to delete, but worth</text>
      <text x="28" y="192" class="body muted">watching because env vars</text>
      <text x="28" y="226" class="body muted">may include secrets.</text>
    </g>

    <g transform="translate(970 372)">
      <rect class="card" width="455" height="250"/>
      <rect x="28" y="28" width="110" height="38" rx="7" fill="#7052a0"/>
      <text x="83" y="53" class="badge" text-anchor="middle">REVIEW</text>
      <text x="28" y="112" class="mono ink">UNKNOWN</text>
      <text x="28" y="158" class="body muted">New folders are flagged so</text>
      <text x="28" y="192" class="body muted">Claude Code updates do not</text>
      <text x="28" y="226" class="body muted">create blind spots.</text>
    </g>
  </g>

  <g transform="translate(92 1600)">
    <text x="0" y="0" class="h2 ink">How the workflow works</text>
    <g transform="translate(0 60)">
      <rect class="card" width="342" height="220"/>
      <circle cx="42" cy="44" r="25" fill="#18202f"/>
      <text x="42" y="53" class="h3" fill="#ffffff" text-anchor="middle">1</text>
      <text x="28" y="104" class="h3 ink">Scan live disk</text>
      <text x="28" y="148" class="body muted">Read local folders and</text>
      <text x="28" y="182" class="body muted">sizes.</text>
    </g>
    <g transform="translate(362 60)">
      <rect class="card" width="342" height="220"/>
      <circle cx="42" cy="44" r="25" fill="#18202f"/>
      <text x="42" y="53" class="h3" fill="#ffffff" text-anchor="middle">2</text>
      <text x="28" y="104" class="h3 ink">Classify safety</text>
      <text x="28" y="148" class="body muted">Attach importance,</text>
      <text x="28" y="182" class="body muted">tradeoffs, and docs.</text>
    </g>
    <g transform="translate(724 60)">
      <rect class="card" width="342" height="220"/>
      <circle cx="42" cy="44" r="25" fill="#18202f"/>
      <text x="42" y="53" class="h3" fill="#ffffff" text-anchor="middle">3</text>
      <text x="28" y="104" class="h3 ink">Show dashboard</text>
      <text x="28" y="148" class="body muted">Readable cards, badges,</text>
      <text x="28" y="182" class="body muted">and paths.</text>
    </g>
    <g transform="translate(1086 60)">
      <rect class="card" width="342" height="220"/>
      <circle cx="42" cy="44" r="25" fill="#18202f"/>
      <text x="42" y="53" class="h3" fill="#ffffff" text-anchor="middle">4</text>
      <text x="28" y="104" class="h3 ink">Act carefully</text>
      <text x="28" y="148" class="body muted">Planned cleanup is</text>
      <text x="28" y="182" class="body muted">dry-run first.</text>
    </g>
  </g>

  <g transform="translate(92 1970)">
    <rect width="1426" height="118" rx="14" fill="#18202f"/>
    <text x="38" y="48" class="h3" fill="#ffffff">Value: visibility + safety + privacy + actionability</text>
    <text x="38" y="86" class="body" fill="#dce5ee">Use it to understand what Claude Code stores locally, what grows over time, and what can be cleaned without guessing.</text>
  </g>

  <text x="92" y="2140" class="small muted">Source: assets/claude-manager-infographic.html   Image: assets/images/claude-manager-infographic.png</text>
</svg>
